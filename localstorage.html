<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Portfolio Local Storage</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.table th{
    background:#0d6efd;
    color:white;
}

</style>

</head>
<body>

<div class="container mt-5">

<div class="card p-4">

<h3 class="text-center mb-4">
Stock Portfolio Local Storage
</h3>

<form id="stockForm">

<div class="row">

<div class="col-md-3 mb-3">
<input type="text" id="company" class="form-control" placeholder="Company Name" required>
</div>

<div class="col-md-2 mb-3">
<input type="text" id="symbol" class="form-control" placeholder="Symbol" required>
</div>

<div class="col-md-2 mb-3">
<input type="number" id="qty" class="form-control" placeholder="Quantity" required>
</div>

<div class="col-md-2 mb-3">
<input type="number" id="buyPrice" class="form-control" placeholder="Buy Price" required>
</div>

<div class="col-md-2 mb-3">
<input type="number" id="currentPrice" class="form-control" placeholder="Current Price" required>
</div>

<div class="col-md-1 mb-3">
<button class="btn btn-primary w-100">Add</button>
</div>

</div>

</form>

<div class="table-responsive mt-3">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Company</th>
<th>Symbol</th>
<th>Qty</th>
<th>Buy</th>
<th>Current</th>
<th>Investment</th>
<th>Current Value</th>
<th>Profit/Loss</th>
<th>Action</th>

</tr>

</thead>

<tbody id="stockTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

let stocks = JSON.parse(localStorage.getItem("portfolio")) || [];

displayStocks();

document.getElementById("stockForm").addEventListener("submit",function(e){

e.preventDefault();

let company=document.getElementById("company").value;
let symbol=document.getElementById("symbol").value;
let qty=parseInt(document.getElementById("qty").value);
let buy=parseFloat(document.getElementById("buyPrice").value);
let current=parseFloat(document.getElementById("currentPrice").value);

stocks.push({

company,
symbol,
qty,
buy,
current

});

saveData();

displayStocks();

this.reset();

});

function saveData(){

localStorage.setItem("portfolio",JSON.stringify(stocks));

}

function displayStocks(){

let table=document.getElementById("stockTable");

table.innerHTML="";

stocks.forEach((stock,index)=>{

let investment=stock.qty*stock.buy;

let currentValue=stock.qty*stock.current;

let profit=currentValue-investment;

table.innerHTML+=`

<tr>

<td>${stock.company}</td>

<td>${stock.symbol}</td>

<td>${stock.qty}</td>

<td>₹${stock.buy}</td>

<td>₹${stock.current}</td>

<td>₹${investment.toFixed(2)}</td>

<td>₹${currentValue.toFixed(2)}</td>

<td class="${profit>=0?'text-success':'text-danger'}">

₹${profit.toFixed(2)}

</td>

<td>

<button class="btn btn-danger btn-sm"

onclick="deleteStock(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

function deleteStock(index){

if(confirm("Delete this stock?")){

stocks.splice(index,1);

saveData();

displayStocks();

}

}

</script>

</body>
</html>
