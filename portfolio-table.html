<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cards</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f7fb;
            padding:30px;
            font-family:Arial, sans-serif;
        }

        .dashboard-card{
            border:none;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            transition:all 0.3s ease;
            overflow:hidden;
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .card-body{
            padding:25px;
        }

        .card-title{
            color:#6c757d;
            font-size:15px;
            margin-bottom:10px;
        }

        .card-value{
            font-size:28px;
            font-weight:700;
        }

        .card-icon{
            width:60px;
            height:60px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
        }

        .investment{
            background:rgba(13,110,253,0.15);
            color:#0d6efd;
        }

        .value{
            background:rgba(25,135,84,0.15);
            color:#198754;
        }

        .profit{
            background:rgba(32,201,151,0.15);
            color:#20c997;
        }

        .gain{
            background:rgba(255,193,7,0.15);
            color:#ffc107;
        }

        .section-title{
            margin-bottom:25px;
            font-weight:700;
        }
    </style>
</head>
<body>

<div class="container-fluid">

    <h2 class="section-title">
        <i class="bi bi-speedometer2 me-2"></i>
        Dashboard Overview
    </h2>

    <div class="row g-4">

        <!-- Total Investment -->
        <div class="col-lg-3 col-md-6">
            <div class="card dashboard-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="card-title">Total Investment</h6>
                            <h3 class="card-value">₹2,50,000</h3>
                        </div>

                        <div class="card-icon investment">
                            <i class="bi bi-cash-stack"></i>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Current Value -->
        <div class="col-lg-3 col-md-6">
            <div class="card dashboard-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="card-title">Current Value</h6>
                            <h3 class="card-value">₹3,15,000</h3>
                        </div>

                        <div class="card-icon value">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Profit/Loss -->
        <div class="col-lg-3 col-md-6">
            <div class="card dashboard-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="card-title">Profit / Loss</h6>
                            <h3 class="card-value text-success">
                                +₹65,000
                            </h3>
                        </div>

                        <div class="card-icon profit">
                            <i class="bi bi-arrow-up-right-circle"></i>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Today's Gain -->
        <div class="col-lg-3 col-md-6">
            <div class="card dashboard-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="card-title">Today's Gain</h6>
                            <h3 class="card-value text-warning">
                                +₹2,500
                            </h3>
                        </div>

                        <div class="card-icon gain">
                            <i class="bi bi-bar-chart-line"></i>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
