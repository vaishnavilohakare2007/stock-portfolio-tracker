<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Search & Filter Stocks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.table th{
background:#0d6efd;
color:white;
}

.search-box{
position:relative;
}

.search-box i{
position:absolute;
top:12px;
left:15px;
}

.search-box input{
padding-left:40px;
}

.badge-buy{
background:#198754;
}

.badge-tech{
background:#0d6efd;
}

.badge-bank{
background:#fd7e14;
}

.badge-auto{
background:#6f42c1;
}

</style>

</head>
<body>

<div class="container mt-5">

<div class="card p-4">

<h3 class="mb-4">
<i class="bi bi-search"></i>
Search & Filter Stocks
</h3>

<div class="row mb-4">

<div class="col-md-6">

<div class="search-box">

<i class="bi bi-search"></i>

<input
type="text"
class="form-control"
id="searchInput"
placeholder="Search Stock Name or Symbol">

</div>

</div>

<div class="col-md-4">

<select id="sectorFilter" class="form-select">

<option value="">All Sectors</option>

<option value="Technology">Technology</option>

<option value="Banking">Banking</option>

<option value="Automobile">Automobile</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100" onclick="resetFilter()">
Reset
</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead>

<tr>

<th>Stock</th>
<th>Symbol</th>
<th>Sector</th>
<th>Qty</th>
<th>Buy Price</th>
<th>Current Price</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>Tata Consultancy Services</td>
<td>TCS</td>
<td><span class="badge badge-tech">Technology</span></td>
<td>10</td>
<td>3500</td>
<td>3800</td>

</tr>

<tr>

<td>Infosys</td>
<td>INFY</td>
<td><span class="badge badge-tech">Technology</span></td>
<td>15</td>
<td>1500</td>
<td>1620</td>

</tr>

<tr>

<td>HDFC Bank</td>
<td>HDFCBANK</td>
<td><span class="badge badge-bank">Banking</span></td>
<td>20</td>
<td>1450</td>
<td>1580</td>

</tr>

<tr>

<td>ICICI Bank</td>
<td>ICICIBANK</td>
<td><span class="badge badge-bank">Banking</span></td>
<td>18</td>
<td>930</td>
<td>1025</td>

</tr>

<tr>

<td>Mahindra & Mahindra</td>
<td>M&M</td>
<td><span class="badge badge-auto">Automobile</span></td>
<td>12</td>
<td>1800</td>
<td>1950</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

const searchInput=document.getElementById("searchInput");
const sectorFilter=document.getElementById("sectorFilter");

searchInput.addEventListener("keyup",filterTable);

sectorFilter.addEventListener("change",filterTable);

function filterTable(){

let search=searchInput.value.toLowerCase();

let sector=sectorFilter.value;

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let stock=row.cells[0].textContent.toLowerCase();

let symbol=row.cells[1].textContent.toLowerCase();

let rowSector=row.cells[2].innerText.trim();

let searchMatch=
stock.includes(search) ||
symbol.includes(search);

let sectorMatch=
sector==="" || rowSector===sector;

row.style.display=
(searchMatch && sectorMatch)
?
""
:
"none";

});

}

function resetFilter(){

searchInput.value="";
sectorFilter.value="";
filterTable();

}

</script>

</body>
</html>
